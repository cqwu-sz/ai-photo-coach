name: iOS Build (unsigned IPA)

# Why this exists:
#   Most contributors here are on Windows (no Mac). To still get a binary
#   onto a real iPhone we run the iOS build on a free GitHub-hosted macOS
#   runner, archive without code signing, and zip the .app into a bare
#   "Payload/" so Sideloadly / AltStore can re-sign it locally with the
#   user's free Apple ID. See docs/IOS_SIDELOAD.md.
#
# Triggers: pushes to main, manual dispatch, and tags v* (for releases).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "ios/**"
      - "shared/schema/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
  workflow_dispatch: {}

jobs:
  # Fast guard: type-check all .swift files against the iOS SDK without
  # going through xcodebuild's full archive pipeline. Catches the syntax
  # / actor-isolation / name-collision class of bugs (the ones that bit
  # us on commit e185346) in ~45s instead of waiting 3-5min for archive.
  #
  # Runs on macOS so we get the real SwiftUI / UIKit / Foundation
  # modules; ubuntu Swift can't see those frameworks.
  swift-typecheck:
    name: Swift typecheck guard
    runs-on: macos-15
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version && xcrun --sdk iphoneos --show-sdk-path
      - name: Typecheck all .swift files
        shell: bash
        run: |
          set -euo pipefail
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          # Collect every source file in one swiftc invocation so the
          # type-checker sees the whole module (cross-file references
          # like ShareSheet across PrivacyDisclosureView ↔ AdminInsightsView
          # only resolve when compiled together).
          # macOS ships bash 3.2 which has no `mapfile`. Use a NUL-safe
          # find | xargs pipeline instead so paths with spaces survive.
          COUNT=$(find ios/AIPhotoCoach -name '*.swift' -not -path '*/.build/*' | wc -l | tr -d ' ')
          echo "Type-checking $COUNT files against iOS SDK"
          find ios/AIPhotoCoach -name '*.swift' -not -path '*/.build/*' -print0 \
            | xargs -0 xcrun swiftc \
                -typecheck \
                -sdk "$SDK" \
                -target arm64-apple-ios17.0 \
                -parse-as-library
          echo "All .swift files type-checked cleanly."

  build-unsigned-ipa:
    name: Build .ipa (${{ matrix.variant }})
    needs: swift-typecheck
    # macos-15 ships Xcode 16.x by default, which is required because
    # XcodeGen ≥ 2.42 emits projects with `objectVersion = 77` that
    # Xcode 15.4 (the macos-14 default) refuses to open.
    runs-on: macos-15
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          # 正式包 (App Store / 真实用户)：
          #   - 不含本机 endpoint 覆盖能力 (#if INTERNAL_BUILD 全部 fold out)
          #   - 必须烤入 PROD_API_BASE_URL (Info.plist API_BASE_URL),
          #     缺失则构建期失败 (project.yml postCompileScripts 兜底)
          - variant: production
            scheme: AIPhotoCoach
            artifact_name: AIPhotoCoach-unsigned-ipa
            ipa_name: AIPhotoCoach-unsigned.ipa
            xcarchive: AIPhotoCoach.xcarchive
            app_name: AIPhotoCoach.app
            release_attach: true

          # Internal 包 (团队联调 / 局域网开发)：
          #   - 包含 ServerEndpointPublicView + 本机覆盖 API
          #   - 不烤 API_BASE_URL；启动后由用户在 App 内填写
          #   - Bundle ID = com.aiphotocoach.app.internal，与正式包永远互不冲突
          #   - 显示名 "拾光 Dev"、AppIcon-Sunset，桌面一眼可辨
          #   - 永远不会被 attach 到 GitHub Release
          - variant: internal
            scheme: AIPhotoCoach-Internal
            artifact_name: AIPhotoCoach-Internal-unsigned-ipa
            ipa_name: AIPhotoCoach-Internal-unsigned.ipa
            xcarchive: AIPhotoCoach-Internal.xcarchive
            app_name: AIPhotoCoach-Internal.app
            release_attach: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list runtimes | head -n 5 || true

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      # Production xcconfig is required for the production variant — it
      # supplies the real backend URL that gets baked into Info.plist.
      # Internal variant skips this step (it intentionally leaves
      # API_BASE_URL empty so the user must configure at runtime).
      - name: Write Production.xcconfig from secret (production only)
        if: matrix.variant == 'production'
        working-directory: ios
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_API_BASE_URL:-}" ]; then
            echo "::error title=Missing required secret::secrets.PROD_API_BASE_URL is empty."
            echo ""
            echo "How to fix:"
            echo "  1. Open https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name:  PROD_API_BASE_URL"
            echo "  4. Value: the production backend URL (e.g. https://api.your-domain.com)"
            echo "  5. Re-run this workflow."
            echo ""
            echo "See ios/README.md → 'Build variants' for the full Production xcconfig design."
            exit 1
          fi
          mkdir -p Config
          cat > Config/Production.xcconfig <<EOF
          // Generated by ios-build.yml at $(date -u +%FT%TZ).
          // Sourced from secrets.PROD_API_BASE_URL.
          API_BASE_URL = ${PROD_API_BASE_URL}
          EOF
          # Sanity log (do NOT print the value).
          wc -c Config/Production.xcconfig

      - name: Stub Production.xcconfig (internal only)
        if: matrix.variant == 'internal'
        working-directory: ios
        # Even though the internal target overrides configFiles to "",
        # xcodegen still expects the file referenced at the project
        # root to exist. Provide an empty stub.
        run: |
          mkdir -p Config
          : > Config/Production.xcconfig

      - name: Generate Xcode project
        working-directory: ios
        run: |
          xcodegen generate
          ls -la AIPhotoCoach.xcodeproj || true

      - name: Build (no code signing)
        working-directory: ios
        run: |
          set -euo pipefail
          # Archive into ./build/${{ matrix.xcarchive }} without signing.
          # CODE_SIGNING_ALLOWED=NO is the canonical way to produce an
          # unsigned .app on GitHub Actions where no provisioning profile
          # is installed.
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project AIPhotoCoach.xcodeproj \
            -scheme ${{ matrix.scheme }} \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/${{ matrix.xcarchive }} \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ONLY_ACTIVE_ARCH=NO 2>&1 | tee build/xcodebuild-${{ matrix.variant }}.log
          test -d build/${{ matrix.xcarchive }}

      - name: Upload xcodebuild log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ matrix.variant }}
          path: ios/build/xcodebuild-${{ matrix.variant }}.log
          retention-days: 7
          if-no-files-found: warn

      - name: Dump build errors to step summary (always)
        if: always()
        working-directory: ios
        shell: bash
        run: |
          LOG=build/xcodebuild-${{ matrix.variant }}.log
          {
            echo "## xcodebuild diagnostics (${{ matrix.variant }})"
            echo ""
            if [ -f "$LOG" ]; then
              echo "### Lines matching 'error:' / 'fatal' / 'FAILED'"
              echo ""
              echo '```'
              grep -E -i 'error:|fatal|FAILED|undefined symbol|cannot find|no such (module|file)' "$LOG" | head -n 80 || echo "(no error lines matched)"
              echo '```'
              echo ""
              echo "### Last 100 lines of $LOG"
              echo ""
              echo '```'
              tail -n 100 "$LOG"
              echo '```'
            else
              echo "_$LOG not found (build step probably never ran)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Internal builds add a QR scanner in ServerEndpointPublicView, so
      # the Info.plist *must* carry NSCameraUsageDescription. If the
      # XcodeGen properties block ever stops injecting it (e.g. someone
      # accidentally overwrites Info-Internal.plist with the wrong
      # contents), App Store-style review would crash the scanner on
      # first launch. Catch that here, in CI, rather than at runtime.
      - name: Verify Info.plist permission strings (internal only)
        if: matrix.variant == 'internal'
        working-directory: ios
        shell: bash
        run: |
          set -euo pipefail
          PLIST="build/${{ matrix.xcarchive }}/Products/Applications/${{ matrix.app_name }}/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "::error::Info.plist not found at $PLIST"
            exit 1
          fi
          for KEY in NSCameraUsageDescription NSAppTransportSecurity; do
            VAL=$(/usr/libexec/PlistBuddy -c "Print :$KEY" "$PLIST" 2>/dev/null || true)
            if [ -z "$VAL" ]; then
              echo "::error::Internal build is missing Info.plist key: $KEY"
              echo "         Check ios/project.yml AIPhotoCoach-Internal.info.properties"
              exit 1
            fi
          done
          echo "Internal Info.plist permission keys verified."

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          APP_PATH="build/${{ matrix.xcarchive }}/Products/Applications/${{ matrix.app_name }}"
          if [ ! -d "$APP_PATH" ]; then
            # XcodeGen 有时给 internal target 的 .app 文件名跟 target 名一致而非 scheme 名,
            # 容错列一下实际产物。
            echo "::warning::expected $APP_PATH not found, scanning..."
            find build/${{ matrix.xcarchive }}/Products -name '*.app' -maxdepth 4
            APP_PATH=$(find build/${{ matrix.xcarchive }}/Products/Applications -maxdepth 1 -name '*.app' | head -n 1)
            test -d "$APP_PATH" || (echo "no .app found" && exit 1)
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qr ${{ matrix.ipa_name }} Payload
          ls -lh ${{ matrix.ipa_name }}

      # Suffix the artifact name with the short git sha so a colleague
      # downloading "AIPhotoCoach-Internal-unsigned-ipa" from a 2-week-old
      # Actions run doesn't accidentally install yesterday's build. The
      # IPA file name itself stays stable so Sideloadly / AltStore can
      # auto-resign by file identity.
      - name: Compute short SHA
        id: sha
        shell: bash
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.sha.outputs.short }}
          path: ios/build/${{ matrix.ipa_name }}
          retention-days: 14
          if-no-files-found: error

      # 仅 production 走 GitHub Release attach。Internal IPA 永远只作为
      # CI artifact 存在 — 防止公开下载链接误把内部包当正式包发出去。
      - name: Attach to GitHub Release (production tags only)
        if: matrix.release_attach && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/build/${{ matrix.ipa_name }}
          generate_release_notes: true
