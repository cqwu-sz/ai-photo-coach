name: iOS Build (unsigned IPA)

# Why this exists:
#   Most contributors here are on Windows (no Mac). To still get a binary
#   onto a real iPhone we run the iOS build on a free GitHub-hosted macOS
#   runner, archive without code signing, and zip the .app into a bare
#   "Payload/" so Sideloadly / AltStore can re-sign it locally with the
#   user's free Apple ID. See docs/IOS_SIDELOAD.md.
#
# Triggers: pushes to main, manual dispatch, and tags v* (for releases).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "ios/**"
      - "shared/schema/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
  workflow_dispatch: {}

jobs:
  build-unsigned-ipa:
    name: Build unsigned .ipa (macOS)
    # macos-15 ships Xcode 16.x by default, which is required because
    # XcodeGen ≥ 2.42 emits projects with `objectVersion = 77` that
    # Xcode 15.4 (the macos-14 default) refuses to open.
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list runtimes | head -n 5 || true

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ios
        run: |
          xcodegen generate
          ls -la AIPhotoCoach.xcodeproj || true

      - name: Build (no code signing)
        working-directory: ios
        run: |
          set -euo pipefail
          # Archive into ./build/AIPhotoCoach.xcarchive without signing.
          # CODE_SIGNING_ALLOWED=NO is the canonical way to produce an
          # unsigned .app on GitHub Actions where no provisioning profile
          # is installed.
          #
          # Tee the full xcodebuild output to a file so we can upload it
          # as an artifact even when the archive step fails. The previous
          # workflow only surfaced "exit code 65" which is useless for
          # diagnosing Swift compile errors from a Windows dev machine.
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project AIPhotoCoach.xcodeproj \
            -scheme AIPhotoCoach \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/AIPhotoCoach.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ONLY_ACTIVE_ARCH=NO 2>&1 | tee build/xcodebuild.log
          # Fail loud if archive is missing.
          test -d build/AIPhotoCoach.xcarchive

      - name: Upload xcodebuild log (always, for diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/build/xcodebuild.log
          retention-days: 7
          if-no-files-found: warn

      - name: Dump build errors to step summary (always)
        if: always()
        working-directory: ios
        shell: bash
        run: |
          {
            echo "## xcodebuild diagnostics"
            echo ""
            if [ -f build/xcodebuild.log ]; then
              echo "### Lines matching 'error:' / 'fatal' / 'FAILED'"
              echo ""
              echo '```'
              grep -E -i 'error:|fatal|FAILED|undefined symbol|cannot find|no such (module|file)' build/xcodebuild.log | head -n 80 || echo "(no error lines matched)"
              echo '```'
              echo ""
              echo "### Last 100 lines of xcodebuild.log"
              echo ""
              echo '```'
              tail -n 100 build/xcodebuild.log
              echo '```'
            else
              echo "_xcodebuild.log not found (build step probably never ran)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Publish the failure log to an orphan `ci-logs` branch so that
      # collaborators without GitHub login (e.g. our Windows-side agent
      # working from the Cursor IDE) can read xcodebuild errors via the
      # public raw.githubusercontent.com URL. Each failure overwrites the
      # previous log; this branch is *never* merged into main and lives
      # only for diagnostic plumbing.
      - name: Publish failure log to ci-logs branch
        if: failure() && hashFiles('ios/build/xcodebuild.log') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short HEAD)
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          TMP=$(mktemp -d)
          cp ios/build/xcodebuild.log "$TMP/xcodebuild-${SHA}.log"
          # Also keep a 'latest' copy for stable URL.
          cp ios/build/xcodebuild.log "$TMP/xcodebuild-latest.log"

          git config user.email "ci@noreply.github.com"
          git config user.name  "github-actions[bot]"

          # Use a temp worktree on the orphan branch.
          git worktree add -B ci-logs /tmp/ci-logs --no-checkout HEAD || true
          if [ ! -d /tmp/ci-logs/.git ] && [ ! -f /tmp/ci-logs/.git ]; then
            # Fresh orphan if checkout didn't work.
            rm -rf /tmp/ci-logs
            mkdir -p /tmp/ci-logs
            (
              cd /tmp/ci-logs
              git init -q
              git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
              git checkout --orphan ci-logs
              git rm -rf . 2>/dev/null || true
            )
          else
            (
              cd /tmp/ci-logs
              # Detach to orphan if currently empty / new.
              git fetch origin ci-logs:ci-logs 2>/dev/null || true
              git checkout ci-logs 2>/dev/null || git checkout --orphan ci-logs
            )
          fi

          mkdir -p /tmp/ci-logs/ios
          cp "$TMP/xcodebuild-${SHA}.log"    /tmp/ci-logs/ios/
          cp "$TMP/xcodebuild-latest.log"    /tmp/ci-logs/ios/

          cd /tmp/ci-logs
          git add ios/
          git commit -m "ios xcodebuild log for ${SHA} (${STAMP})" -q || { echo "nothing to commit"; exit 0; }
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" 2>/dev/null || \
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin ci-logs
          echo ""
          echo "Log published at:"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/ci-logs/ios/xcodebuild-latest.log"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/ci-logs/ios/xcodebuild-${SHA}.log"

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          APP_PATH="build/AIPhotoCoach.xcarchive/Products/Applications/AIPhotoCoach.app"
          test -d "$APP_PATH" || (echo "missing $APP_PATH" && exit 1)
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          # An IPA is just a zip with a Payload/ folder.
          cd build
          zip -qr AIPhotoCoach-unsigned.ipa Payload
          ls -lh AIPhotoCoach-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPhotoCoach-unsigned-ipa
          path: ios/build/AIPhotoCoach-unsigned.ipa
          retention-days: 14
          if-no-files-found: error

      - name: Attach to GitHub Release (only on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/build/AIPhotoCoach-unsigned.ipa
          generate_release_notes: true
