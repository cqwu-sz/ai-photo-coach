name: AIPhotoCoach
options:
  bundleIdPrefix: com.aiphotocoach
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  AIPhotoCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Exclude Tests/ from the app target — those files import XCTest
      # which is only available to bundle.unit-test targets. Pre-v9
      # CI failed with "no such module 'XCTest'" because PostProcessSnapshotTests.swift
      # was being compiled into the app binary.
      - path: AIPhotoCoach
        excludes:
          - "Tests/**"
    info:
      path: AIPhotoCoach/Info.plist
      properties:
        CFBundleDisplayName: 拾光
        CFBundleName: ShiGuang
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiredDeviceCapabilities:
          - armv7
          - arkit
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Used to capture an environment scan video, run the live AR shot-guide view, and power the AI-tuned shoot screen that auto-applies focal length / ISO / shutter / EV / WB."
        NSMicrophoneUsageDescription: "Optional - audio is not stored, only video frames are analyzed."
        NSPhotoLibraryUsageDescription: "Used so you can import reference photos that train your personal style."
        NSPhotoLibraryAddUsageDescription: "Used when you tap '保存到相册' on a photo you just shot with an AI plan, so the final image lands in your camera roll."
        NSMotionUsageDescription: "Used to estimate the direction your camera is facing during the scan, AR alignment, and the live shoot HUD."
        NSLocationWhenInUseUsageDescription: "Optional — for the 光影 (light & shadow) scene mode, your location lets us compute exact sun direction and golden-hour countdowns so the AI can recommend rim-light angles and time-sensitive shots."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiphotocoach.app
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  AIPhotoCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AIPhotoCoachTests
    dependencies:
      - target: AIPhotoCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiphotocoach.app.tests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  AIPhotoCoach:
    build:
      targets:
        AIPhotoCoach: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIPhotoCoachTests
    archive:
      config: Release
