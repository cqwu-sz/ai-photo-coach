<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>修图 · AI Photo Coach</title>
<link rel="stylesheet" href="./css/style.css">
<style>
  body { background:#0c0d10; color:#eee; font-family:system-ui, sans-serif; margin:0; }
  header { padding:12px 16px; font-weight:600; }
  .pp-stage { display:flex; flex-direction:column; gap:12px; padding:12px; max-width:540px; margin:0 auto; }
  .pp-canvas-wrap { background:#000; border-radius:14px; overflow:hidden; aspect-ratio: 4 / 5; display:flex; align-items:center; justify-content:center; }
  .pp-canvas-wrap canvas { max-width:100%; max-height:100%; }
  .pp-presets { display:flex; gap:6px; overflow-x:auto; padding:4px 0; }
  .pp-presets button { background:#222; color:#eee; border:0; padding:6px 12px; border-radius:999px; font-size:12px; }
  .pp-presets button.active { background:#3a82ff; }
  .pp-sliders { display:grid; gap:6px; }
  .pp-sliders label { display:grid; grid-template-columns: 60px 1fr 36px; align-items:center; font-size:12px; gap:8px; }
  .pp-actions { display:flex; gap:8px; }
  .pp-actions button { flex:1; padding:10px; border-radius:10px; border:0; background:#3a82ff; color:#fff; font-weight:600; }
  .pp-actions button.secondary { background:#333; }
  .pp-msg { font-size:12px; color:#aaa; }
</style>
</head>
<body>
<header>修图 · 端侧 LUT + 基础美颜</header>
<div class="pp-stage">
  <div class="pp-canvas-wrap"><canvas id="pp-canvas" width="640" height="800"></canvas></div>
  <div class="pp-presets" id="pp-presets"></div>
  <div class="pp-sliders" id="pp-sliders"></div>
  <div class="pp-actions">
    <button class="secondary" id="pp-reset">重置</button>
    <input type="file" id="pp-file" accept="image/*" hidden>
    <button class="secondary" id="pp-open">载入图片</button>
    <button id="pp-save">下载副本</button>
  </div>
  <div class="pp-msg" id="pp-msg"></div>
</div>
<script type="module" src="./js/post_process.js"></script>
</body>
</html>
