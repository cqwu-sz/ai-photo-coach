<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>拍摄方案 · 拾光</title>
    <link rel="stylesheet" href="/web/css/style.css" />
    <link rel="stylesheet" href="/web/css/shot-pager.css" />
    <!-- v7 — Three.js examples/jsm modules use bare "three" imports.
         An importmap remaps them to the same CDN copy as the explicit
         imports in our own modules so SkeletonUtils, GLTFLoader,
         BokehPass, etc. all resolve. -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <button id="back-btn" class="badge">← 重拍</button>
        <span id="model-badge" class="badge"></span>
      </header>

      <div id="content"></div>

      <div class="bottom-bar">
        <button id="retake-btn" class="btn">重新环视拍摄</button>
      </div>
    </main>

    <script type="module" src="/web/js/result.js"></script>
  </body>
</html>
