<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>按方案试拍 · 拾光</title>
    <link rel="stylesheet" href="/web/css/style.css" />
    <!-- guide.js pulls avatar_preview.js, which in turn uses
         three/examples modules with bare "three" imports. -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <button id="back-btn" class="badge">← 返回结果</button>
        <span id="shot-badge" class="badge live">机位 #?</span>
      </header>

      <div class="guide-stage" id="guide-stage">
        <video id="preview" autoplay playsinline muted></video>
        <!-- Fallback background shown when the camera is unavailable;
             we paint a sample environment frame so users still see the
             AR overlay sitting on a visual scene. -->
        <img id="demo-bg" class="demo-bg" alt="" hidden />

        <!-- AR overlay: SVG sized to the video element, painted with
             a virtual silhouette + heading hud -->
        <svg id="ar-overlay" class="ar-overlay" viewBox="0 0 100 100"
             preserveAspectRatio="xMidYMid slice"></svg>

        <!-- Aligned-frame border + center "OK shoot now" banner -->
        <div class="ok-frame" aria-hidden="true"></div>
        <div class="ok-banner" id="ok-banner" hidden>
          <span class="ok-banner-mark">●</span>
          <span class="ok-banner-text">全部对位 — 按下快门</span>
        </div>

        <div class="hud">
          <div class="hud-row hud-row-top">
            <div class="hud-status-card" id="hud-heading">
              <span class="hud-status-label">方位</span>
              <span class="hud-status-value">--</span>
              <span class="hud-status-target">目标 0°</span>
            </div>
            <div class="hud-status-card" id="hud-pitch">
              <span class="hud-status-label">仰角</span>
              <span class="hud-status-value">--</span>
              <span class="hud-status-target">目标 0°</span>
            </div>
            <div class="hud-status-card" id="hud-distance">
              <span class="hud-status-label">距离</span>
              <span class="hud-status-value">--</span>
              <span class="hud-status-target">目标 2.0 m</span>
            </div>
            <div class="hud-status-card" id="hud-person">
              <span class="hud-status-label">入框</span>
              <span class="hud-status-value">--</span>
              <span class="hud-status-target">需要 1+ 人</span>
            </div>
          </div>
          <div id="hud-msg" class="hud-msg">把手机转到目标方向</div>
        </div>
      </div>

      <section class="section guide-summary">
        <h3 id="guide-title">这一张怎么拍</h3>
        <p id="coach-brief" class="coach-brief" style="display: none"></p>
        <div id="guide-meta" class="metric-row"></div>
        <p id="guide-rationale" class="rationale"></p>
      </section>

      <section class="section guide-summary">
        <h3>三步走</h3>
        <ol id="guide-steps" class="guide-steps">
          <li class="guide-step active" data-step="turn">
            <span class="guide-step-num">1</span>
            <div class="guide-step-body">
              <b>转方向</b>
              <span id="step-turn-detail">把手机转到目标方位</span>
            </div>
            <span class="guide-step-check">✓</span>
          </li>
          <li class="guide-step" data-step="walk">
            <span class="guide-step-num">2</span>
            <div class="guide-step-body">
              <b>站位</b>
              <span id="step-walk-detail">距主体约 2.0 米</span>
            </div>
            <span class="guide-step-check">✓</span>
          </li>
          <li class="guide-step" data-step="pose">
            <span class="guide-step-num">3</span>
            <div class="guide-step-body">
              <b>摆姿势</b>
              <span id="step-pose-detail">看屏幕下方的姿势示意</span>
            </div>
            <span class="guide-step-check">✓</span>
          </li>
        </ol>
      </section>

      <section class="section guide-summary">
        <h3>姿势示意</h3>
        <div class="pose-mode-toggle">
          <button class="pose-mode-btn active" data-mode="3d" type="button">立体</button>
          <button class="pose-mode-btn" data-mode="2d" type="button">线稿</button>
        </div>
        <div id="guide-pose-3d" class="guide-pose-3d"></div>
        <div id="guide-pose" class="guide-pose-2d" hidden></div>
      </section>

      <p class="footer-note">
        方位与距离仅供参考，可能有 ± 20% 误差。
      </p>
    </main>

    <script type="module" src="/web/js/guide.js"></script>
  </body>
</html>
